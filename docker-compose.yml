services:

  postgres:
    image: postgres:17-alpine
    container_name: sabaka_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       sabaka_search
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sabaka_search"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sabaka_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: SabakaSearch.API/Dockerfile
    container_name: sabaka_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__Postgres: >-
        Host=postgres;Port=5432;Database=sabaka_search;
        Username=postgres;Password=postgres
      ConnectionStrings__Redis: redis:6379,abortConnect=false
      Cache__SearchResultsTtlMinutes: "10"
      Cache__PopularQueriesTtlMinutes: "5"
      Cache__UserHistoryTtlMinutes: "2"

  front:
    build:
      context: ../front
      dockerfile: Dockerfile
    container_name: sabaka_front
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "80:80"

volumes:
  postgres_data:
  redis_data: